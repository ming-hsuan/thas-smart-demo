<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>THAS SMART Demo - Patient Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 1.5rem; }
    pre  { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>THAS SMART Demo</h1>
  <p>這個畫面會顯示目前病人的基本資料（FHIR Patient）。</p>

  <h2>病人摘要</h2>
  <div id="summary">載入中...</div>

  <h2>完整 Patient JSON</h2>
  <pre id="raw">載入中...</pre>

  <script>
    // 等待 SMART 授權流程完成
    FHIR.oauth2.ready().then(function (client) {
      // 1. 讀目前病人
      return client.patient.read().then(function (patient) {
        // 顯示摘要：姓名 + 性別 + 生日
        var name = (patient.name && patient.name[0]) || {};
        var fullName = (name.given || []).join(" ") + " " + (name.family || "");
        var gender = patient.gender || "(未知)";
        var birthDate = patient.birthDate || "(未知)";

        var summaryEl = document.getElementById("summary");
        summaryEl.innerHTML = `
          <ul>
            <li><strong>姓名：</strong> ${fullName}</li>
            <li><strong>性別：</strong> ${gender}</li>
            <li><strong>生日：</strong> ${birthDate}</li>
            <li><strong>FHIR ID：</strong> ${patient.id}</li>
          </ul>
        `;

        // 顯示完整 JSON
        document.getElementById("raw").textContent =
          JSON.stringify(patient, null, 2);
      });
    }).catch(function (err) {
      // 任何錯誤都印在畫面上，方便你 debug
      document.getElementById("summary").textContent = "發生錯誤，無法載入病人資料。";
      document.getElementById("raw").textContent =
        (err && err.stack) ? err.stack : String(err);
      console.error(err);
    });
  </script>
</body>
</html>
